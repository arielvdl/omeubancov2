map $http_accept $markdown_home {
    default /__missing_markdown__;
    ~*text/markdown /__markdown/index.md;
}

map $http_accept $markdown_privacidade {
    default /__missing_markdown__;
    ~*text/markdown /__markdown/privacidade.md;
}

map $http_accept $markdown_termos {
    default /__missing_markdown__;
    ~*text/markdown /__markdown/termos.md;
}

map $http_accept $markdown_suporte {
    default /__missing_markdown__;
    ~*text/markdown /__markdown/suporte.md;
}

map $http_accept $markdown_docs_api {
    default /__missing_markdown__;
    ~*text/markdown /__markdown/docs-api.md;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Vary "Accept" always;
    add_header Link '</.well-known/api-catalog>; rel="api-catalog"; type="application/linkset+json", </docs/api>; rel="service-doc"; type="text/html", </docs/api/openapi.json>; rel="service-desc"; type="application/openapi+json"' always;

    location = / {
        types {
            text/html html;
            text/markdown md;
        }
        try_files $markdown_home /index.html =404;
    }

    location = /privacidade {
        types {
            text/html html;
            text/markdown md;
        }
        try_files $markdown_privacidade /privacidade.html =404;
    }

    location = /termos {
        types {
            text/html html;
            text/markdown md;
        }
        try_files $markdown_termos /termos.html =404;
    }

    location = /suporte {
        types {
            text/html html;
            text/markdown md;
        }
        try_files $markdown_suporte /suporte.html =404;
    }

    location = /docs/api {
        types {
            text/html html;
            text/markdown md;
        }
        try_files $markdown_docs_api /docs/api.html =404;
    }

    location = /docs/api/ {
        types {
            text/html html;
            text/markdown md;
        }
        try_files $markdown_docs_api /docs/api.html =404;
    }

    location ^~ /__markdown/ {
        types {
            text/markdown md;
        }
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Apple App Site Association - must be served as application/json
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /apple-app-site-association {
        default_type application/json;
        alias /usr/share/nginx/html/.well-known/apple-app-site-association;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600";
    }

    # Android asset links
    location = /.well-known/assetlinks.json {
        default_type application/json;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /.well-known/agent-skills/index.json {
        default_type application/json;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~ ^/\.well-known/agent-skills/.+/SKILL\.md$ {
        types {
            text/markdown md;
        }
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /.well-known/mcp/server-card.json {
        default_type application/json;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /docs/api/openapi.json {
        types {
            application/openapi+json json;
        }
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600";
    }

    # Invite universal links: rewrite /invite/CODE to the static invite page
    # (Next.js output:export generates /invite/placeholder.html for the dynamic route)
    location /invite/ {
        try_files $uri $uri.html /invite/placeholder.html =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store" always;
    }

    # Clean URLs - serve .html without extension
    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    # Cache static assets
    location /_next/static/ {
        expires 1y;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2)$ {
        expires 30d;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public";
    }
}
