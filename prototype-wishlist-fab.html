<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>Wishlist - Tab Bar Camera Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'SF Pro Display', sans-serif;
      background: #f8f8f5;
      width: 390px;
      height: 844px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* Status bar */
    .status-bar {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px 0;
      color: #1a1a0e;
      font-size: 15px;
      font-weight: 600;
    }

    /* Header */
    .header {
      padding: 8px 24px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 { font-size: 26px; font-weight: 800; color: #1a1a0e; }

    .header-icons { display: flex; gap: 16px; }
    .header-icons svg { width: 24px; height: 24px; color: #1a1a0e; }

    /* Filters */
    .filters { display: flex; gap: 8px; padding: 0 24px 16px; }

    .filter-chip {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      border: 1.5px solid #e5e5d8;
      background: #fff;
      color: #6b6b5a;
    }

    .filter-chip.active {
      background: #FFD600;
      border-color: #FFD600;
      color: #1a1a0e;
    }

    /* Month label */
    .month-label { padding: 0 24px 8px; font-size: 13px; color: #6b6b5a; }

    /* Cards */
    .cards {
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      max-height: 540px;
    }

    .card {
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .card-img {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-footer {
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-date { font-size: 13px; color: #6b6b5a; }

    /* ===== Bottom Tab Bar ===== */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 84px;
      background: #fff;
      border-top: 1px solid #e5e5d8;
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding-top: 10px;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0.4;
      cursor: pointer;
      position: relative;
    }

    .tab-item.active { opacity: 1; }

    .tab-item svg { width: 24px; height: 24px; }

    /* ===== Center tab (heart/camera) ===== */
    .tab-center {
      position: relative;
      width: 48px;
      height: 48px;
      margin-top: -8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      cursor: pointer;
      transition: background-color 0.4s ease;
    }

    .tab-center .tab-icon {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tab-center svg { width: 26px; height: 26px; }

    /* Heart state (default / other tabs) */
    .tab-center.state-heart {
      background: transparent;
    }

    .tab-center.state-heart .icon-heart {
      opacity: 1;
      transform: scale(1);
    }

    .tab-center.state-heart .icon-camera {
      opacity: 0;
      transform: scale(0.3) rotate(-90deg);
    }

    /* Camera state (wishlist tab active) */
    .tab-center.state-camera {
      background: #22c55e;
    }

    .tab-center.state-camera .icon-heart {
      opacity: 0;
      transform: scale(0.3) rotate(90deg);
    }

    .tab-center.state-camera .icon-camera {
      opacity: 1;
      transform: scale(1);
    }

    /* Pulse ring */
    .tab-ring {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 24px;
      border: 2px solid #22c55e;
      opacity: 0;
      pointer-events: none;
    }

    .tab-ring.animate {
      animation: pulse-ring 0.6s ease-out forwards;
    }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.8); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Status bar -->
  <div class="status-bar">
    <span>10:48</span>
    <div style="display:flex;gap:6px;align-items:center;">
      <svg width="17" height="12" fill="none"><rect x="0" y="2" width="3" height="10" rx="1" fill="#1a1a0e"/><rect x="4.5" y="0" width="3" height="12" rx="1" fill="#1a1a0e"/><rect x="9" y="4" width="3" height="8" rx="1" fill="#1a1a0e"/><rect x="13.5" y="6" width="3" height="6" rx="1" fill="#1a1a0e"/></svg>
      <svg width="27" height="13" fill="none"><rect x="0" y="1" width="22" height="11" rx="3" stroke="#1a1a0e" stroke-opacity=".35"/><rect x="1.5" y="2.5" width="16" height="8" rx="2" fill="#1a1a0e"/><rect x="23" y="4" width="3" height="5" rx="1" fill="#1a1a0e" fill-opacity=".4"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>Meus Desejos</h1>
    <div class="header-icons">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-chip active">Todos</div>
    <div class="filter-chip">❤️❤️❤️</div>
    <div class="filter-chip">Conquistas</div>
  </div>

  <!-- Month -->
  <div class="month-label">Abril de 2026</div>

  <!-- Cards (sem FAB flutuante) -->
  <div class="cards">
    <div class="card">
      <div class="card-img" style="background:linear-gradient(135deg,#c0392b,#e74c3c,#d35400);">
        <span style="font-size:48px;">🏎️</span>
      </div>
      <div class="card-footer">
        <span class="card-date">9 de abr.</span>
        <span style="font-size:16px;">💛💛💛</span>
      </div>
    </div>
    <div class="card">
      <div class="card-img" style="background:linear-gradient(135deg,#2980b9,#3498db,#1abc9c);">
        <span style="font-size:48px;">🧸</span>
      </div>
      <div class="card-footer">
        <span class="card-date">8 de abr.</span>
        <span style="font-size:16px;">💛💛</span>
      </div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab-item" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a0e" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
    </div>

    <div class="tab-item" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a0e" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>

    <!-- Center: Heart que vira Camera -->
    <div class="tab-item active" onclick="switchTab('wishlist')">
      <div class="tab-center state-camera" id="tabCenter">
        <div class="tab-ring" id="tabRing"></div>
        <div class="tab-icon icon-heart">
          <svg viewBox="0 0 24 24" fill="#FFD600" stroke="none">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <div class="tab-icon icon-camera">
          <svg viewBox="0 0 24 24" fill="#ffffff" stroke="none">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4" fill="#22c55e"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="tab-item" onclick="switchTab('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a0e" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.3-6.7-1.4 1.4M6.7 17.3l-1.4 1.4m0-14.1 1.4 1.4m10.6 10.6 1.4 1.4"/></svg>
    </div>

    <div class="tab-item" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a0e" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
  </div>

  <script>
    const tabCenter = document.getElementById('tabCenter');
    const tabRing = document.getElementById('tabRing');

    function switchTab(tab) {
      if (tab === 'wishlist') {
        // Na aba de desejos: mostra camera (verde)
        tabCenter.classList.remove('state-heart');
        tabCenter.classList.add('state-camera');
      } else {
        // Outras abas: mostra coracao (amarelo)
        tabCenter.classList.remove('state-camera');
        tabCenter.classList.add('state-heart');
      }

      // Pulse
      tabRing.classList.remove('animate');
      void tabRing.offsetWidth;
      tabRing.classList.add('animate');

      // Update active states
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    // Demo: alternate between tabs
    let demoTabs = ['home', 'wishlist', 'home', 'wishlist'];
    let demoIdx = 0;

    function runDemo() {
      setTimeout(() => {
        const tab = demoTabs[demoIdx % demoTabs.length];
        const items = document.querySelectorAll('.tab-item');
        const targetIdx = tab === 'home' ? 0 : 2;

        // Simulate click
        items[targetIdx].click();
        demoIdx++;

        if (demoIdx < 6) setTimeout(runDemo, 2000);
      }, 2000);
    }

    runDemo();
  </script>

</body>
</html>
